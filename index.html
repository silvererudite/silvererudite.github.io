  <!-- ============ Header / Nav ============ -->
  <header class="site-header">

          <defs>
            <!-- butterfly, left half (mirrored for the right) -->
            <g id="spc-bf" fill="none" stroke="var(--orn-teal)" stroke-width="1.4"

              <ellipse cx="134" cy="73" rx="3" ry="4" fill="var(--orn-gold)" stroke="none"/>

              <path d="M157 330 L112 350 M157 336 L120 360"/>
              <path d="M158 266 C150 256 144 248 140 242"/>
              <path d="M156 262 L150 258 M153 257 L147 253 M150 252 L145 248 M147 247 L142 244" stroke-width="0.9"/>
              <path d="M155 288 L149 292 M157 294 L150 298" stroke-width="1"/>
              <circle cx="126" cy="346" r="5.5" stroke="var(--orn-rose)" stroke-width="1.3"/>
              <circle cx="126" cy="346" r="2" fill="var(--orn-gold)" stroke="none"/>
            </g>
          </defs>

          <!-- plate frame + corner accents -->
          <rect x="22" y="22" width="276" height="436" fill="none"
                stroke="var(--orn-gold)" stroke-width="1.6"/>
          <rect x="29" y="29" width="262" height="422" fill="none"
                stroke="var(--orn-gold)" stroke-width="0.8"/>
          <g fill="var(--orn-rose)" stroke="none">
            <path d="M22 22 l8 0 -8 8 z"/>
            <path d="M298 22 l-8 0 8 8 z"/>
            <path d="M22 458 l8 0 -8 -8 z"/>
            <path d="M298 458 l-8 0 8 -8 z"/>
          </g>

          <!-- plate captions (the European scientific-plate twist) -->
          <text x="40" y="46" fill="var(--orn-ink)"
                font-family="'EB Garamond', Georgia, serif" font-style="italic" font-size="12">Pl. I</text>
          <text x="56" y="156" fill="var(--orn-ink)"
                font-family="'EB Garamond', Georgia, serif" font-style="italic" font-size="13">1.</text>
          <text x="56" y="326" fill="var(--orn-ink)"
                font-family="'EB Garamond', Georgia, serif" font-style="italic" font-size="13">2.</text>
          <path d="M86 430 L234 430" stroke="var(--orn-gold)" stroke-width="0.8"/>
          <text x="160" y="444" text-anchor="middle" fill="var(--orn-ink)"
                font-family="'EB Garamond', Georgia, serif" font-size="11" letter-spacing="3.5">LEPIDOPTERA</text>

          <path d="M160 110 C156 110 154 117 154 127 C154 152 156 188 160 200 C164 188 166 152 166 127 C166 117 164 110 160 110 Z"

          <use href="#spc-bf" transform="translate(320 0) scale(-1 1)"/>

          <!-- specimen 2 — moth -->
          <path d="M160 274 C153 274 150 284 150 297 C150 332 155 374 160 386 C165 374 170 332 170 297 C170 284 167 274 160 274 Z"
                fill="var(--orn-ink)" stroke="none"/>
          <circle cx="160" cy="269" r="6" fill="var(--orn-ink)"/>
          <use href="#spc-mo"/>
          <use href="#spc-mo" transform="translate(320 0) scale(-1 1)"/>

      <h1 class="hero-name" data-bind="name">Your Name</h1>
      <p class="hero-tagline" data-bind="tagline"></p>

        <ul class="hero-links" id="hero-links"><!-- injected --></ul>
      </div>

    <!-- ============ Publications ============ -->
    <section id="publications" class="section">
      <div class="section-head">
        <h2>Publications</h2>
        <span class="section-rule"></span>
      </div>
      <ol class="pub-list" id="pub-list"><!-- injected --></ol>
    </section>

    <!-- ============ Projects ============ -->
    <section id="projects" class="section">
      <div class="section-head">
        <h2>Projects</h2>
        <span class="section-rule"></span>
      </div>
      <div class="project-list" id="project-list"><!-- injected --></div>
    </section>

    <!-- ============ Blog / Writing ============ -->
    <section id="blog" class="section">
      <div class="section-head">
        <h2>Writing</h2>
        <span class="section-rule"></span>
        <a class="section-action" id="substack-link" href="#" target="_blank" rel="noopener">
          All posts &rarr;
        </a>
      </div>
      <div class="post-grid" id="post-grid">
        <p class="post-loading">Loading posts&hellip;</p>

    <!-- ============ About ============ -->
    <section id="about" class="section">
      <div class="section-head">

      </div>

  </main>

  <!-- ============ Footer ============ -->
  <footer class="site-footer container">
    <span class="footer-name" data-bind="name"></span>
    <ul class="footer-links" id="footer-links"><!-- injected --></ul>

  <script src="config.js"></script>
